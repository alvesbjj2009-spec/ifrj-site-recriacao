<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <title>Cadastro - IFRJ EPF</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <img src="logotipo.jpg.png" class="logotipo" alt="Logotipo do IFRJ" />
      <h1>Cadastro de Estudante - IFRJ EPF</h1>
    </header>

    <main>
      <section>
        <a href="site_ifrj.html" class="btn-voltar">Voltar</a>
      </section>

      <div class="form-box">
        <form class="form">
          <span class="title">Crie sua Conta</span>
          <span class="subtitle"
            >Preencha os dados abaixo para acessar conteúdos exclusivos e
            acompanhar novidades do campus.</span
          >

          <div class="form-container">
            <input
              type="text"
              class="input"
              placeholder="Nome Completo"
              required
            />
            <input type="email" class="input" placeholder="Email" required />
            <input type="password" class="input" placeholder="Senha" required />
          </div>

          <button>Cadastrar</button>
        </form>

        <div class="form-section">
          <p>Já possui uma conta? <a href="#">Entrar</a></p>
        </div>
      </div>
    </main>

    <footer>
      Desenvolvido por Enzo Alves Costa, Jayanny Francisquini Fraga e Anna Lívia
      Abrahão.
    </footer>
  </body>
</html>
